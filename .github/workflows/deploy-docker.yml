name: Deploy Docker

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag name (format: 1.2.3-rc)"
        required: true
        type: string
  workflow_run:
    workflows: ["Create Release Tag"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-docker-${{ github.ref }}
  cancel-in-progress: true

outputs:
  backend_digest: ${{ jobs.digests.outputs.backend_digest }}
  frontend_digest: ${{ jobs.digests.outputs.frontend_digest }}
  keycloak_digest: ${{ jobs.digests.outputs.keycloak_digest }}
  connector_proxy_digest: ${{ jobs.digests.outputs.connector_proxy_digest }}

env:
  REGISTRY: docker.io
  IMAGE_REPOSITORY: m8flow
  PROJECT: m8flow

jobs:
  prepare:
    name: Prepare Metadata
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      ref: ${{ steps.meta.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.rc_tag || github.event.workflow_run.head_sha || github.ref }}

      - name: Determine and Validate Tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.rc_tag }}"
          else
            git fetch --tags
            TAG=$(git tag --points-at HEAD | sort -V | tail -1)
            if [[ -z "$TAG" ]]; then
              echo "::error::No tag found on HEAD. Ensure the 'Create Release Tag' workflow tagged the commit correctly."
              exit 1
            fi
          fi

          # REGEX VALIDATION: Matches 1.0.0-rc, 12.5.1-rc, etc.
          # Does NOT match v1.0.0-rc or 1.0.0
          if [[ ! $TAG =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc$ ]]; then
            echo "::error::Invalid tag format: '$TAG'. Expected format is '1.0.0-rc' (no leading 'v')."
            exit 1
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "ref=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  build:
    name: Build & Push
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: docker/m8flow.backend.Dockerfile
            context: .
          - name: frontend
            dockerfile: docker/m8flow.frontend.Dockerfile
            context: .
          - name: keycloak
            dockerfile: docker/m8flow.keycloak.Dockerfile
            context: .
          - name: connector-proxy
            dockerfile: m8flow-connector-proxy/Dockerfile
            context: m8flow-connector-proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push ${{ matrix.name }}
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.PROJECT }}-${{ matrix.name }}:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: true
          sbom: true

      - name: Save digest
        run: echo "${{ steps.build.outputs.digest }}" > ${{ matrix.name }}-digest.txt

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.name }}
          path: ${{ matrix.name }}-digest.txt

  digests:
    name: Aggregate digests
    needs: build
    runs-on: ubuntu-latest
    outputs:
      backend_digest: ${{ steps.write.outputs.backend_digest }}
      frontend_digest: ${{ steps.write.outputs.frontend_digest }}
      keycloak_digest: ${{ steps.write.outputs.keycloak_digest }}
      connector_proxy_digest: ${{ steps.write.outputs.connector_proxy_digest }}
    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: ./digests-in
          merge-multiple: true

      - name: Build image-digests artifact and outputs
        id: write
        run: |
          cp ./digests-in/backend-digest.txt backend-image-digest.txt
          cp ./digests-in/frontend-digest.txt frontend-image-digest.txt
          cp ./digests-in/keycloak-digest.txt keycloak-image-digest.txt
          cp ./digests-in/connector-proxy-digest.txt connector-proxy-image-digest.txt
          echo "backend_digest=$(cat backend-image-digest.txt)" >> $GITHUB_OUTPUT
          echo "frontend_digest=$(cat frontend-image-digest.txt)" >> $GITHUB_OUTPUT
          echo "keycloak_digest=$(cat keycloak-image-digest.txt)" >> $GITHUB_OUTPUT
          echo "connector_proxy_digest=$(cat connector-proxy-image-digest.txt)" >> $GITHUB_OUTPUT

      - name: Upload image-digests artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-digests
          path: |
            backend-image-digest.txt
            frontend-image-digest.txt
            keycloak-image-digest.txt
            connector-proxy-image-digest.txt