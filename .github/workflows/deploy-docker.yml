name: Deploy to Docker

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag name (e.g. 1.2.3-rc)"
        required: true
        type: string
  workflow_run:
    workflows: ["Create Release Tag"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_REPOSITORY: m8flow
  PROJECT: m8flow
  # Centralize the list of components to keep it DRY
  COMPONENTS: '["backend", "frontend", "keycloak", "connector-proxy"]'

jobs:
  prepare:
    name: Prepare (resolve ref & tag)
    # Check condition once at the start. If this fails, all 'needs' jobs are skipped.
    if: |
      (vars.AUTO_BUILD == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.meta.outputs.ref }}
      tag: ${{ steps.meta.outputs.tag }}
      components: ${{ env.COMPONENTS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.rc_tag || github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Extract metadata
        id: meta
        run: |
          if [[ -n "${{ github.event.inputs.rc_tag }}" ]]; then
            TAG="${{ github.event.inputs.rc_tag }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            # Ensure we have tags fetched to find the version
            git fetch origin --tags
            TAG=$(git tag --points-at HEAD | sort -V | tail -1)
            [[ -z "$TAG" ]] && { echo "::error::No tag found at HEAD"; exit 1; }
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "ref=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  backup-existing-tags:
    name: Backup Tags
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: ${{ fromJson(needs.prepare.outputs.components) }}
    steps:
      - name: Retag existing image to backup
        uses: tailscale/docker-copy-action@v1
        with:
          src: "${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.PROJECT }}-${{ matrix.component }}:${{ needs.prepare.outputs.tag }}"
          dest: "${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.PROJECT }}-${{ matrix.component }}:${{ needs.prepare.outputs.tag }}-backup"
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true # Tag might not exist yet, which is fine

  build:
    name: Build & Push
    needs: [prepare, backup-existing-tags]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: ${{ fromJson(needs.prepare.outputs.components) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.component == 'connector-proxy' && 'm8flow-connector-proxy' || '.' }}
          file: ${{ matrix.component == 'connector-proxy' && 'm8flow-connector-proxy/Dockerfile' || format('docker/m8flow.{0}.Dockerfile', matrix.component) }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.PROJECT }}-${{ matrix.component }}:${{ needs.prepare.outputs.tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.PROJECT }}-${{ matrix.component }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.PROJECT }}-${{ matrix.component }}:buildcache,mode=max
          provenance: true
          sbom: true

  combine:
    name: Finalize Artifacts
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      # Since matrix jobs run in parallel, we use the build job's completion to gather info
      # Or simpler: download metadata if needed. For most cases, simple logging is enough.
      - name: Finalize
        run: echo "Deployment of version ${{ needs.prepare.outputs.tag }} complete."