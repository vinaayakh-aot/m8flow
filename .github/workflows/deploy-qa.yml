name: Deploy to QA

on:
  # Manual promotion
  workflow_dispatch:
    inputs:
      rc_tag:
        description: "RC tag name (e.g. v1.2.3-rc1)"
        required: true
        type: string
      backend_image_digest:
        description: "Backend image digest (sha256:...) from Dev build"
        required: true
        type: string
      frontend_image_digest:
        description: "Frontend image digest (sha256:...) from Dev build"
        required: true
        type: string
      keycloak_image_digest:
        description: "Keycloak image digest (sha256:...) from Dev build"
        required: true
        type: string
      connector_proxy_image_digest:
        description: "Connector-proxy image digest (sha256:...) from Dev build"
        required: true
        type: string

  # Optional: automatic call from deploy-dev.yml
  workflow_call:
    inputs:
      rc_tag:
        required: true
        type: string
      backend_image_digest:
        required: true
        type: string
      frontend_image_digest:
        required: true
        type: string
      keycloak_image_digest:
        required: true
        type: string
      connector_proxy_image_digest:
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-qa
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  PROJECT: m8flow

jobs:
  # -------------------------
  # Validate Inputs
  # -------------------------
  validate:
    name: Validate Promotion Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate RC tag format
        run: |
          TAG="${{ inputs.rc_tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            echo "::error::Invalid RC tag: $TAG"
            exit 1
          fi

      - name: Validate backend digest format
        run: |
          DIGEST="${{ inputs.backend_image_digest }}"
          [[ "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]] || {
            echo "::error::Invalid backend image digest"
            exit 1
          }

      - name: Validate frontend digest format
        run: |
          DIGEST="${{ inputs.frontend_image_digest }}"
          [[ "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]] || {
            echo "::error::Invalid frontend image digest"
            exit 1
          }

      - name: Validate keycloak digest format
        run: |
          DIGEST="${{ inputs.keycloak_image_digest }}"
          [[ "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]] || {
            echo "::error::Invalid keycloak image digest"
            exit 1
          }

      - name: Validate connector-proxy digest format
        run: |
          DIGEST="${{ inputs.connector_proxy_image_digest }}"
          [[ "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]] || {
            echo "::error::Invalid connector-proxy image digest"
            exit 1
          }

      - name: Reject tag-based references
        run: |
          for v in "${{ inputs.backend_image_digest }}" "${{ inputs.frontend_image_digest }}" "${{ inputs.keycloak_image_digest }}" "${{ inputs.connector_proxy_image_digest }}"; do
            if [[ "$v" == *":"* && "$v" != sha256:* ]]; then
              echo "::error::Tag-based image reference detected. Digest required."
              exit 1
            fi
          done
