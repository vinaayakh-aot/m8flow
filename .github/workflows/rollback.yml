name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to rollback"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      previous_tag:
        description: "Previously proven release or RC tag (e.g. v1.5.0 or v1.5.1-rc2)"
        required: true
        type: string
      backend_image_digest:
        description: "Backend image digest (sha256:...) for rollback"
        required: true
        type: string
      frontend_image_digest:
        description: "Frontend image digest (sha256:...) for rollback"
        required: true
        type: string
      keycloak_image_digest:
        description: "Keycloak image digest (sha256:...) for rollback"
        required: true
        type: string
      connector_proxy_image_digest:
        description: "Connector-proxy image digest (sha256:...) for rollback"
        required: true
        type: string
      create_rollback_tag:
        description: "Create rollback tag (e.g. v1.5.0-rb1)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

concurrency:
  group: rollback-${{ inputs.environment }}
  cancel-in-progress: false

env:
  REGISTRY: docker.io
  PROJECT: m8flow

jobs:
  # -------------------------
  # Validate Inputs
  # -------------------------
  validate:
    name: Validate Rollback Inputs
    runs-on: ubuntu-latest

    steps:
      - name: Validate environment
        run: |
          case "${{ inputs.environment }}" in
            dev|qa|prod) ;;
            *)
              echo "::error::Invalid environment"
              exit 1
              ;;
          esac

      - name: Validate previous tag format
        run: |
          TAG="${{ inputs.previous_tag }}"
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$ ]] || {
            echo "::error::Invalid tag format: $TAG"
            exit 1
          }

      - name: Validate backend digest format
        run: |
          [[ "${{ inputs.backend_image_digest }}" =~ ^sha256:[a-f0-9]{64}$ ]] || {
            echo "::error::Invalid backend image digest"
            exit 1
          }

      - name: Validate frontend digest format
        run: |
          [[ "${{ inputs.frontend_image_digest }}" =~ ^sha256:[a-f0-9]{64}$ ]] || {
            echo "::error::Invalid frontend image digest"
            exit 1
          }

      - name: Validate keycloak digest format
        run: |
          [[ "${{ inputs.keycloak_image_digest }}" =~ ^sha256:[a-f0-9]{64}$ ]] || {
            echo "::error::Invalid keycloak image digest"
            exit 1
          }

      - name: Validate connector-proxy digest format
        run: |
          [[ "${{ inputs.connector_proxy_image_digest }}" =~ ^sha256:[a-f0-9]{64}$ ]] || {
            echo "::error::Invalid connector-proxy image digest"
            exit 1
          }

      - name: Rollback note
        run: |
          echo "::notice::Rollback is not automated. Perform rollback manually (e.g. via ECS/console)."
          echo "Validated inputs: environment=${{ inputs.environment }}, previous_tag=${{ inputs.previous_tag }}"
