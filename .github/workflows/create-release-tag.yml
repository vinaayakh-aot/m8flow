name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to tag (must be on main). Leave empty to use latest commit on main."
        required: false
        default: ""
        type: string
      tag_name:
        description: "Tag name (vX.Y.Z or vX.Y.Z-rcN). Leave empty to use latest tag on main."
        required: false
        default: ""
        type: string
      release_type:
        description: "Release candidate or final release"
        required: true
        type: choice
        options:
          - release-candidate
          - final-release
      tag_message:
        description: "Optional annotated tag message"
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  create-tag:
    name: Create Annotated Release Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # Resolve commit to tag
      # -------------------------
      - name: Resolve commit to tag
        id: resolve_commit
        run: |
          git fetch origin main
          if [[ -n "${{ inputs.commit_sha }}" ]]; then
            echo "sha=${{ inputs.commit_sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=$(git rev-parse origin/main)" >> $GITHUB_OUTPUT
          fi

      # -------------------------
      # Resolve tag name
      # -------------------------
      - name: Resolve tag name
        id: resolve_tag
        run: |
          git fetch origin --tags 2>/dev/null || true
          if [[ -n "${{ inputs.tag_name }}" ]]; then
            echo "tag=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
            echo "user_provided=true" >> $GITHUB_OUTPUT
          else
            LATEST=$(git describe --tags --abbrev=0 origin/main 2>/dev/null || true)
            if [[ -z "$LATEST" ]]; then
              echo "::error::No tag found on main. Provide a tag name or create a tag first."
              exit 1
            fi
            # increment $LATEST by one patch
            # If $LATEST is v1.2.3(-rcN), produce v1.2.4 (drop rc if present)
            if [[ "$LATEST" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-rc[0-9]+)?$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"
              # Always increment patch
              NEXT_PATCH=$((PATCH + 1))
              if [[ "${{ inputs.release_type }}" == "release-candidate" ]]; then
                echo "tag=v${MAJOR}.${MINOR}.${NEXT_PATCH}-rc0" >> $GITHUB_OUTPUT
              else
                echo "tag=v${MAJOR}.${MINOR}.${NEXT_PATCH}" >> $GITHUB_OUTPUT
              fi
            else
              echo "::error::Cannot parse last tag '$LATEST'"
              exit 1
            fi
            echo "user_provided=false" >> $GITHUB_OUTPUT
          fi

      # -------------------------
      # Maintainer / Permission Check
      # -------------------------
      - name: Verify user has write permissions
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });

            if (!['admin', 'maintain', 'write'].includes(perm.permission)) {
              core.setFailed(
                `User ${context.actor} does not have permission to create release tags`
              );
            }

      # -------------------------
      # Validate SemVer Tag
      # -------------------------
      - name: Validate tag format
        run: |
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$ ]]; then
            echo "::error::Invalid tag format: $TAG"
            echo "Expected: vX.Y.Z or vX.Y.Z-rcN"
            exit 1
          fi

      # -------------------------
      # Validate Commit Exists on main
      # -------------------------
      - name: Verify commit exists on main branch
        run: |
          COMMIT="${{ steps.resolve_commit.outputs.sha }}"

          if ! git cat-file -e "$COMMIT^{commit}"; then
            echo "::error::Commit $COMMIT does not exist"
            exit 1
          fi

          if ! git branch -r --contains "$COMMIT" | grep -q "origin/main"; then
            echo "::error::Commit $COMMIT is not reachable from main branch"
            exit 1
          fi

      # -------------------------
      # Ensure Tag Does Not Already Exist
      # -------------------------
      - name: Check tag does not already exist
        run: |
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

      # -------------------------
      # Configure Git Identity
      # -------------------------
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # -------------------------
      # Create Annotated Tag
      # -------------------------
      - name: Create annotated tag
        env:
          TAG: ${{ steps.resolve_tag.outputs.tag }}
          COMMIT: ${{ steps.resolve_commit.outputs.sha }}
          MESSAGE: ${{ inputs.tag_message }}
        run: |
          if [[ -z "$MESSAGE" ]]; then
            MESSAGE="Release $TAG"
          fi

          git tag -a "$TAG" "$COMMIT" -m "$MESSAGE"

      # -------------------------
      # Push Tag
      # -------------------------
      - name: Push tag to origin
        run: |
          git push origin "${{ steps.resolve_tag.outputs.tag }}"

      # -------------------------
      # Create GitHub Release (final tags only)
      # -------------------------
      - name: Create GitHub Release
        if: ${{ !contains(steps.resolve_tag.outputs.tag, '-rc') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: ${{ steps.resolve_tag.outputs.tag }}
          body: |
            Release ${{ steps.resolve_tag.outputs.tag }}

            Commit: ${{ steps.resolve_commit.outputs.sha }}
          draft: false
          prerelease: false

      # -------------------------
      # Summary
      # -------------------------
      - name: Tag creation summary
        run: |
          IS_RC=${{ contains(steps.resolve_tag.outputs.tag, '-rc') }}
          USER_PROVIDED=${{ steps.resolve_tag.outputs.user_provided }}

          echo "## Release Tag 🏷️" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.resolve_tag.outputs.tag }}\`$([ "$USER_PROVIDED" = "false" ] && echo " (auto-generated next version)")" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ steps.resolve_commit.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** $([ "$IS_RC" == "true" ] && echo "Release Candidate" || echo "Final Release")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$IS_RC" == "true" ]]; then
            echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "1. This RC tag will trigger the **Deploy to Dev** workflow" >> $GITHUB_STEP_SUMMARY
            echo "2. After Dev testing, promote to QA using the **Deploy to QA** workflow" >> $GITHUB_STEP_SUMMARY
            echo "3. Create a final release tag when ready for production" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "1. This release tag will trigger the **Deploy to Production** workflow" >> $GITHUB_STEP_SUMMARY
            echo "2. Approve the deployment in the GitHub Environments page" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Created by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Created at:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
